name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        type: string
      draft:
        description: Create as draft
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag_name }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: stable
          cache: true
          rustflags: ""

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          case "${{ runner.os }}" in
            Linux)
              cp target/release/diskanalyzer release-artifacts/diskanalyzer-linux
              ;;
            macOS)
              cp target/release/diskanalyzer release-artifacts/diskanalyzer-macos
              ;;
            Windows)
              cp target/release/diskanalyzer.exe release-artifacts/diskanalyzer-windows.exe
              ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}" >&2
              exit 1
              ;;
          esac

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ runner.os }}-binary
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts
          pattern: "*-binary"
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name || inputs.tag_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
